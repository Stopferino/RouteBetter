kind = "api"
previewPath = "/"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[[services]]
localPort = 8000
name = "Flight Optimizer"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace && PORT=8000 python3 -m uvicorn flight_webapp.app:app --host 0.0.0.0 --port 8000"

[services.production.run]
args = ["bash", "start_prod.sh"]

[services.production.run.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/health"
